<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Importer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;">

<div class="container">
    <h1 style="color: var(--primary-color); margin-bottom: 1.5rem;">Import a Recipe</h1>

    <form action="/" method="post" class="form-group">
        <label for="recipe_url">Paste Recipe URL</label>
        <input type="url" id="recipe_url" name="recipe_url" placeholder="https://allrecipes.com/..." required>

        <button class="btn" type="submit">Get Recipe</button>
        <a href="/move_to_add_manual" class="btn btn-secondary">Add Manually</a>
        <a href="{{ url_for('get_full_data') }}" class="btn btn-secondary">View My Collection</a>
    </form>

{% if error %}
    <p class="status-msg msg-error">{{ error }}</p>
{% endif %}

{% if msg %}
    <p class="status-msg msg-success">{{ msg }}</p>
{% endif %}
</div>

</body>
</html>
